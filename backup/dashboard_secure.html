<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFI Enterprise Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1a56db' } } } }
    </script>
    <style>
        body { background-color: #f4f7fc; font-family: 'Kanit', sans-serif; overflow: hidden; }
        .animate-fade { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .interactive-card { transition: all 0.3s ease; background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%); border: 1px solid rgba(255, 255, 255, 0.6); }
        .interactive-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(26, 86, 219, 0.1); }
    </style>
</head>
<body class="text-gray-800 flex h-screen">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative">
            <h2 class="text-2xl font-bold text-center mb-6">เข้าสู่ระบบ (API Secured)</h2>
            <div class="space-y-3">
                <button id="btn-exec" class="w-full p-4 border rounded-xl hover:bg-blue-50 text-left font-bold">📊 Executive View</button>
                <div class="p-4 border rounded-xl bg-gray-50">
                    <select id="owner-select" class="w-full p-2 border rounded-lg mb-2"><option>กำลังโหลดรายชื่อ...</option></select>
                    <button id="btn-owner" class="w-full py-2 bg-purple-600 text-white rounded-lg font-bold">Login as Owner</button>
                </div>
                <button id="btn-auditor" class="w-full p-4 border rounded-xl hover:bg-teal-50 text-left font-bold">🔎 Auditor View</button>
            </div>
            <div id="loading-spinner" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center">Loading...</div>
        </div>
    </div>

    <main id="main-dashboard" class="flex-1 flex flex-col h-screen overflow-y-auto hidden opacity-0 transition-opacity">
        <div class="p-10 max-w-7xl mx-auto w-full">
            <header class="flex justify-between items-center mb-8 border-b pb-4">
                <h1 class="text-3xl font-bold">OFI Intelligence Platform</h1>
                <button onclick="window.location.reload()" class="text-red-600 font-medium">ออกจากระบบ</button>
            </header>
            <div id="app-content" class="animate-fade"></div>
        </div>
    </main>

    <script type="module">
        import { OFIDataService } from './src/services/dataService.js';
        import { DashboardApp } from './src/components/dashboardApp.js';

        const API_BASE_URL = 'http://127.0.0.1:8000';
        let appInstance = null;

        // ผูกฟังก์ชันเข้า window เพื่อให้ปุ่ม HTML เรียกใช้ได้
        window.login = (role) => fetchDashboardData(`Bearer ${role}`);
        window.loginOwner = () => {
            const id = document.getElementById('owner-select').value;
            fetchDashboardData(`Bearer owner:${id}`);
        };

        // แก้ไขในฟังก์ชัน fetchDashboardData ตรงส่วนนี้:
async function fetchDashboardData(token) {
    document.getElementById('loading-spinner').classList.remove('hidden');

    try {
        const response = await fetch(`${API_BASE_URL}/api/dashboard-data`, {
            method: 'GET',
            headers: { 'Authorization': token }
        });

        if (!response.ok) throw new Error("Unauthorized");
        const result = await response.json();
        
        // 🌟 ใส่ตรงนี้: เปลี่ยนจากการโชว์ JSON เป็นการวาด Dashboard
        const dataService = new OFIDataService(result.data);
        const app = new DashboardApp(dataService); // ใช้ Class ที่เราแยกไฟล์ไว้
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        document.getElementById('main-dashboard').style.opacity = '1';
        
        // สั่งวาดหน้าจอตาม Role ที่รับมาจาก API
        app.renderView(result.role); 

    } catch (error) {
        alert("API Error");
    }
}

        // โหลดข้อมูล Owner ตอนเริ่มต้น
        fetch(`${API_BASE_URL}/api/owners`)
            .then(res => res.json())
            .then(json => {
                document.getElementById('owner-select').innerHTML = json.data.map(o => `<option value="${o.id}">${o.nameThai}</option>`).join('');
            });
    </script>
</body>
</html>
